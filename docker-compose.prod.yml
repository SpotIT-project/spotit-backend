services:
    db:
      image: postgres:17
      environment:
        POSTGRES_USER: spotit
        POSTGRES_PASSWORD_FILE: /run/secrets/db_password
        POSTGRES_DB: spotitdb
      volumes:
        - postgres_data:/var/lib/postgresql/data
      secrets:
        - db_password
      healthcheck:
        test: ["CMD-SHELL", "pg_isready -U spotit -d spotitdb"]
        interval: 5s
        timeout: 5s
        retries: 5

    api:
      build:
        context: .
        dockerfile: Dockerfile
      environment:
        ASPNETCORE_ENVIRONMENT: Production
        ASPNETCORE_URLS: http://+:8080
      ports:
        - "8080:8080"
      secrets:
        - connection_string
        - jwt_key

secrets:
    db_password:
      external: true
    connection_string:
      external: true
    jwt_key:
      external: true

volumes:
    postgres_data: