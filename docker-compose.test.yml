# docker-compose.test.yml
# PURPOSE: Standalone Postgres container for integration tests ONLY.
# Runs on port 5433 to avoid collision with the dev DB on port 5432.
#
# Usage:
#   docker compose -f docker-compose.test.yml up -d
#   dotnet test
#   docker compose -f docker-compose.test.yml down

services:
  test-db:
    image: postgres:17
    container_name: spotit-test-pg
    environment:
      # Hardcoded credentials — this is a throwaway test DB, not production
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: spotit_test
    ports:
      # Host port 5433 → container port 5432
      # This way dev DB (5432) and test DB (5433) can run simultaneously
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d spotit_test"]
      interval: 3s
      timeout: 3s
      retries: 10
    # tmpfs makes tests faster — DB lives in RAM, no disk writes
    tmpfs:
      - /var/lib/postgresql/data
